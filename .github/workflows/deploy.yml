name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # CI: quick sanity checks before deploying anything.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check JavaScript
        run: |
          for f in app.js diagrams.js export.js effects.js; do
            node --check "$f"
          done
      - name: Verify required files exist
        run: |
          for f in index.html styles.css README.md; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done

  # CD: publish the static site to GitHub Pages.
  deploy:
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
